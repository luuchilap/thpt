<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sĩ Tử Sinh Tồn - Phản Xạ Tiếng Anh THPTQG</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary-text: #f8fafc;
            --muted-text: #94a3b8;
            --true-color: #10b981;
            --true-shadow: #059669;
            --false-color: #f43f5e;
            --false-shadow: #e11d48;
            --accent-color: #f59e0b;
            --primary-btn: #6366f1;
            --primary-btn-shadow: #4f46e5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #0f172a 70%);
            color: var(--primary-text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
        }

        .game-container {
            width: 100%;
            max-width: 480px;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 32px;
            box-shadow: 0 24px 48px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
            text-align: center;
            position: relative;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s ease;
        }

        .hidden { display: none !important; }

        /* --- ANIMATIONS --- */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); color: var(--accent-color); }
            100% { transform: scale(1); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }
        .animate-fade-in { animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-pop { animation: pop 0.3s ease-out; display: inline-block; }
        .animate-shake { animation: shake 0.4s ease-in-out; }

        /* --- SCREEN: START --- */
        .title {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
            letter-spacing: -0.02em;
        }
        .subtitle {
            font-size: 1.05rem;
            color: var(--muted-text);
            margin-bottom: 32px;
            line-height: 1.5;
        }
        .btn-start {
            background: var(--primary-btn);
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 1.1rem;
            font-weight: 800;
            border-radius: 100px;
            cursor: pointer;
            box-shadow: 0 6px 0 var(--primary-btn-shadow), 0 15px 25px rgba(99, 102, 241, 0.4);
            transition: all 0.15s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            width: 100%;
        }
        .btn-start:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 var(--primary-btn-shadow), 0 5px 10px rgba(99, 102, 241, 0.4);
        }

        /* --- SCREEN: GAMEPLAY --- */
        .hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.1rem;
            font-weight: 800;
            margin-bottom: 24px;
        }
        .score-box {
            background: rgba(255,255,255,0.05);
            padding: 10px 18px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .streak-badge {
            color: var(--accent-color);
            background: rgba(245, 158, 11, 0.15);
            padding: 10px 18px;
            border-radius: 14px;
            border: 1px solid rgba(245, 158, 11, 0.2);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Thanh thời gian kịch tính */
        .timer-container {
            width: 100%;
            height: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            margin-bottom: 32px;
            overflow: hidden;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
        }
        .timer-bar {
            width: 100%;
            height: 100%;
            background: var(--true-color);
            border-radius: 10px;
            transition: width 0.1s linear, background-color 0.3s;
            box-shadow: 0 0 12px var(--true-color);
        }

        /* Khung hiển thị câu hỏi */
        .question-box {
            min-height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.35rem;
            font-weight: 600;
            line-height: 1.5;
            margin-bottom: 32px;
            padding: 24px;
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .highlight {
            color: var(--accent-color);
            position: relative;
            display: inline-block;
            font-weight: 800;
        }
        .highlight::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--accent-color);
            border-radius: 2px;
            opacity: 0.5;
        }

        /* Khu vực nút bấm Đúng/Sai */
        .control-buttons {
            display: flex;
            gap: 16px;
        }
        .btn-game {
            flex: 1;
            border: none;
            padding: 24px 20px;
            font-size: 1.4rem;
            font-weight: 800;
            color: white;
            border-radius: 24px;
            cursor: pointer;
            transition: all 0.15s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .btn-game span {
            font-size: 0.85rem;
            opacity: 0.8;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn-true { 
            background: var(--true-color); 
            box-shadow: 0 8px 0 var(--true-shadow), 0 15px 20px rgba(16, 185, 129, 0.3);
        }
        .btn-false { 
            background: var(--false-color); 
            box-shadow: 0 8px 0 var(--false-shadow), 0 15px 20px rgba(244, 63, 94, 0.3);
        }
        .btn-game:active { 
            transform: translateY(8px); 
        }
        .btn-true:active { box-shadow: 0 0 0 var(--true-shadow), 0 5px 10px rgba(16, 185, 129, 0.3); }
        .btn-false:active { box-shadow: 0 0 0 var(--false-shadow), 0 5px 10px rgba(244, 63, 94, 0.3); }

        /* --- SCREEN: GAME OVER --- */
        .gameover-title {
            color: var(--false-color);
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 24px;
            text-transform: uppercase;
            letter-spacing: -1px;
            text-shadow: 0 0 20px rgba(244, 63, 94, 0.4);
        }
        .result-box {
            background: rgba(0,0,0,0.2);
            padding: 24px;
            border-radius: 20px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-around;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .result-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .result-label {
            font-size: 0.9rem;
            color: var(--muted-text);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .result-value {
            font-size: 2.5rem;
            font-weight: 800;
            color: white;
        }
        .result-value.highlight-score { color: var(--accent-color); }
        
        .explanation-box {
            background: rgba(244, 63, 94, 0.1);
            border: 1px solid rgba(244, 63, 94, 0.2);
            padding: 20px;
            text-align: left;
            border-radius: 16px;
            margin-bottom: 32px;
            font-size: 1.05rem;
            line-height: 1.6;
        }
        .explanation-box strong {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--false-color);
            margin-bottom: 8px;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

<div class="game-container animate-fade-in" id="main-container">
    
    <div id="start-screen" class="animate-fade-in">
        <h1 class="title">Sĩ Tử Sinh Tồn</h1>
        <p class="subtitle">Luyện phản xạ Tiếng Anh THPTQG cực căng.<br>Sai 1 câu = Điêu đứng!</p>
        <button class="btn-start" onclick="startGame()">Vào Phòng Thi</button>
    </div>

    <div id="game-screen" class="hidden">
        <div class="hud">
            <div class="score-box">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                <span id="score-txt" style="margin-left: 6px;">0</span>
            </div>
            <div class="streak-badge">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"></path></svg>
                <span id="streak-txt">0</span>
            </div>
        </div>
        
        <div class="timer-container">
            <div id="timer" class="timer-bar"></div>
        </div>

        <div id="question" class="question-box">
            </div>

        <div class="control-buttons">
            <button class="btn-game btn-false" onclick="submitAnswer(false)">
                SAI
                <span>Phím A / &larr;</span>
            </button>
            <button class="btn-game btn-true" onclick="submitAnswer(true)">
                ĐÚNG
                <span>Phím D / &rarr;</span>
            </button>
        </div>
    </div>

    <div id="gameover-screen" class="hidden">
        <h1 class="gameover-title">Trượt Tốt Nghiệp!</h1>
        
        <div class="result-box">
            <div class="result-item">
                <span class="result-label">Tổng điểm</span>
                <span class="result-value highlight-score" id="final-score">0</span>
            </div>
            <div class="result-item">
                <span class="result-label">Chuỗi Max</span>
                <span class="result-value" id="max-streak">0</span>
            </div>
        </div>

        <div class="explanation-box">
            <strong>
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                Lỗi sai câu vừa rồi
            </strong>
            <p id="explanation-txt"></p>
        </div>

        <button class="btn-start" onclick="restartGame()">Thi Lại Lần Nữa</button>
    </div>

</div>

<script>
    // --- NGÂN HÀNG DỮ LIỆU CÂU HỎI THPTQG THỬ NGHIỆM ---
    const questionBank = [
        { q: "Every Sunday, he <span class='highlight'>go</span> to the cinema with his girlfriend.", a: false, e: "Lỗi chia động từ: Chủ ngữ 'he' ngôi thứ 3 số ít, phải dùng 'goes' chứ không dùng 'go'." },
        { q: "The word <span class='highlight'>'prohibit'</span> has the SAME meaning as <span class='highlight'>'ban'</span>.", a: true, e: "Chính xác: Cả hai từ này đều mang nghĩa là 'cấm đoán'." },
        { q: "She has been learning English <span class='highlight'>since</span> 5 years.", a: false, e: "Lỗi giới từ: Khoảng thời gian '5 years' phải đi với giới từ 'for', 'since' chỉ đi với mốc thời gian." },
        { q: "If I <span class='highlight'>were</span> you, I <span class='highlight'>would buy</span> that smartphone.", a: true, e: "Chính xác: Đây là cấu trúc câu điều kiện loại 2 (giả định trái ngược hiện tại)." },
        { q: "The word <span class='highlight'>'academic'</span> has the main stress on the SECOND syllable.", a: false, e: "Lỗi trọng âm: Từ 'academic' phát âm là /ˌæk.əˈdem.ɪk/, trọng âm rơi vào âm tiết thứ 3 (dem)." },
        { q: "He is <span class='highlight'>interested in</span> reading history books in his free time.", a: true, e: "Chính xác: Cấu trúc cố định 'be interested in + V-ing/Noun' nghĩa là hứng thú với cái gì." },
        { q: "Although he was tired, <span class='highlight'>but</span> he still finished his homework.", a: false, e: "Lỗi ngữ pháp kinh điển: Trong tiếng Anh đã dùng 'Although' (Mặc dù) thì KHÔNG được dùng 'but' (nhưng) ở vế sau." }
    ];

    // --- BIẾN TRẠNG THÁI GAME ---
    let score = 0;
    let streak = 0;
    let maxStreak = 0;
    let currentQuestion = null;
    let availableQuestions = [];
    
    let gameInterval = null;
    let timeLeft = 100; // Tỷ lệ % thanh thời gian
    let timeStep = 1; 

    // --- LOGIC ĐIỀU KHIỂN CHÍNH ---
    function startGame() {
        document.getElementById("start-screen").classList.add("hidden");
        document.getElementById("gameover-screen").classList.add("hidden");
        const gameScreen = document.getElementById("game-screen");
        gameScreen.classList.remove("hidden");
        
        // Reset animation
        gameScreen.style.animation = 'none';
        gameScreen.offsetHeight; /* trigger reflow */
        gameScreen.style.animation = 'fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards';
        
        score = 0;
        streak = 0;
        maxStreak = 0;
        availableQuestions = [...questionBank]; // Sao chép bộ câu hỏi để dùng
        
        updateHUD();
        nextQuestion();
    }

    function nextQuestion() {
        if (availableQuestions.length === 0) {
            availableQuestions = [...questionBank];
        }

        const randIndex = Math.floor(Math.random() * availableQuestions.length);
        currentQuestion = availableQuestions[randIndex];
        availableQuestions.splice(randIndex, 1);

        const qBox = document.getElementById("question");
        qBox.innerHTML = currentQuestion.q;
        
        qBox.style.animation = 'none';
        qBox.offsetHeight; /* trigger reflow */
        qBox.style.animation = 'fadeInUp 0.3s ease-out forwards';
        
        resetAndStartTimer();
    }

    // --- HỆ THỐNG THỜI GIAN GIẢM DẦN (TIME DECAY) ---
    function resetAndStartTimer() {
        clearInterval(gameInterval);
        
        let totalTimeSeconds = Math.max(1.5, 5 - (streak * 0.25)); 
        
        timeLeft = 100;
        const timerBar = document.getElementById("timer");
        timerBar.style.width = "100%";
        timerBar.style.backgroundColor = "var(--true-color)";
        timerBar.style.boxShadow = "0 0 12px var(--true-color)";

        const intervalStep = 50; 
        const totalIntervals = (totalTimeSeconds * 1000) / intervalStep;
        timeStep = 100 / totalIntervals;

        gameInterval = setInterval(() => {
            timeLeft -= timeStep;
            if (timeLeft <= 0) {
                timeLeft = 0;
                timerBar.style.width = "0%";
                clearInterval(gameInterval);
                triggerShake();
                setTimeout(() => gameOver("Hết giờ rồi! Tốc độ phản xạ của bạn cần nhanh hơn nữa."), 400);
            } else {
                timerBar.style.width = timeLeft + "%";
                if (timeLeft < 30) {
                    timerBar.style.backgroundColor = "var(--false-color)";
                    timerBar.style.boxShadow = "0 0 12px var(--false-color)";
                }
            }
        }, intervalStep);
    }

    // --- XỬ LÝ ĐÁP ÁN ---
    function submitAnswer(userAns) {
        clearInterval(gameInterval);

        if (userAns === currentQuestion.a) {
            streak++;
            if (streak > maxStreak) maxStreak = streak;
            
            let speedBonus = Math.round(timeLeft / 10); 
            score += 10 + (streak * 2) + speedBonus;
            
            updateHUD(true);
            nextQuestion();
        } else {
            triggerShake();
            setTimeout(() => gameOver(currentQuestion.e), 400);
        }
    }

    function triggerShake() {
        const container = document.getElementById("main-container");
        container.classList.remove("animate-shake");
        container.offsetHeight; /* reflow */
        container.classList.add("animate-shake");
    }

    function gameOver(explanationText) {
        clearInterval(gameInterval);
        document.getElementById("game-screen").classList.add("hidden");
        const gameOverScreen = document.getElementById("gameover-screen");
        gameOverScreen.classList.remove("hidden");
        
        gameOverScreen.style.animation = 'none';
        gameOverScreen.offsetHeight;
        gameOverScreen.style.animation = 'fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards';
        
        document.getElementById("final-score").innerText = score;
        document.getElementById("max-streak").innerText = maxStreak;
        document.getElementById("explanation-txt").innerHTML = explanationText;
    }

    function restartGame() {
        startGame();
    }

    function updateHUD(animate = false) {
        const scoreTxt = document.getElementById("score-txt");
        const streakTxt = document.getElementById("streak-txt");
        
        scoreTxt.innerText = score;
        streakTxt.innerText = streak;

        if (animate) {
            scoreTxt.classList.remove("animate-pop");
            streakTxt.classList.remove("animate-pop");
            scoreTxt.offsetHeight; // reflow
            scoreTxt.classList.add("animate-pop");
            streakTxt.classList.add("animate-pop");
        }
    }

    // --- HỖ TRỢ BÀN PHÍM CHO MÁY TÍNH (PC CONTROLS) ---
    window.addEventListener("keydown", (e) => {
        if (document.getElementById("game-screen").classList.contains("hidden")) return;
        
        if (e.key === "a" || e.key === "A" || e.key === "ArrowLeft") {
            submitAnswer(false);
            const btn = document.querySelector('.btn-false');
            btn.style.transform = 'translateY(8px)';
            btn.style.boxShadow = '0 0 0 var(--false-shadow), 0 5px 10px rgba(244, 63, 94, 0.3)';
            setTimeout(() => {
                btn.style.transform = '';
                btn.style.boxShadow = '';
            }, 150);
        } else if (e.key === "d" || e.key === "D" || e.key === "ArrowRight") {
            submitAnswer(true);
            const btn = document.querySelector('.btn-true');
            btn.style.transform = 'translateY(8px)';
            btn.style.boxShadow = '0 0 0 var(--true-shadow), 0 5px 10px rgba(16, 185, 129, 0.3)';
            setTimeout(() => {
                btn.style.transform = '';
                btn.style.boxShadow = '';
            }, 150);
        }
    });
</script>

</body>
</html>
